name: Dependabot auto-approve and merge

on:
  pull_request:
  workflow_dispatch:
    inputs:
      pr-number:
        description: "Dependabot PR number to approve/merge (ignored if all-open=true)"
        required: false
        type: string
      all-open:
        description: "If true, approve/merge all open Dependabot PRs"
        required: false
        type: boolean
        default: true

jobs:
  dependabot:
    name: Auto-approve and merge Dependabot PR
    runs-on: ubuntu-latest
    if: ${{ (github.event_name == 'pull_request' && github.actor == 'dependabot[bot]') || github.event_name == 'workflow_dispatch' }}

    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Auto-approve and merge (pull_request)
        if: ${{ github.event_name == 'pull_request' }}
        uses: fastify/github-action-merge-dependabot@v3
        with:
          merge-method: squash
          use-github-auto-merge: true

      - name: Auto-approve and merge (workflow_dispatch)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: fastify/github-action-merge-dependabot@v3
        with:
          pr-number: ${{ github.event.inputs.pr-number }}
          merge-method: squash
          use-github-auto-merge: true

  collect-open-dependabot-prs:
    name: Collect open Dependabot PRs
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.all-open == 'true' }}
    permissions:
      pull-requests: read
    outputs:
      pr_numbers: ${{ steps.collect.outputs.pr_numbers }}
    steps:
      - name: Collect PR numbers
        id: collect
        uses: actions/github-script@v7
        with:
          script: |
            const pulls = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100,
            });

            const prNumbers = pulls
              .filter((pr) => pr.user?.login === "dependabot[bot]")
              .map((pr) => pr.number);

            core.info(`Found ${prNumbers.length} open Dependabot PR(s).`);
            core.setOutput("pr_numbers", JSON.stringify(prNumbers));

  dependabot-all-open:
    name: Auto-approve and merge all open Dependabot PRs
    runs-on: ubuntu-latest
    needs: collect-open-dependabot-prs
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.all-open == 'true' && needs.collect-open-dependabot-prs.outputs.pr_numbers != '[]' }}
    permissions:
      pull-requests: write
      contents: write
    strategy:
      fail-fast: false
      matrix:
        pr_number: ${{ fromJson(needs.collect-open-dependabot-prs.outputs.pr_numbers) }}
    steps:
      - name: Auto-approve and merge (workflow_dispatch: all-open)
        uses: fastify/github-action-merge-dependabot@v3
        with:
          pr-number: ${{ matrix.pr_number }}
          merge-method: squash
          use-github-auto-merge: true
